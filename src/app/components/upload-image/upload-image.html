<div class="upload-wrapper">
  <div class="upload-container">

    <div class="page-header">
      <h2>✦ Share a Photo</h2>
      <p>Add a photo to your feed</p>
    </div>

    <mat-card class="upload-card">
      <!-- Drop Zone -->
      <div
        class="drop-zone"
        *ngIf="!previewUrl"
        (drop)="onDrop($event)"
        (dragover)="onDragOver($event)"
        (click)="fileInput.click()"
      >
        <mat-icon class="upload-icon">add_photo_alternate</mat-icon>
        <p class="drop-title">Drag & drop your photo here</p>
        <p class="drop-sub">or click to browse</p>
        <span class="drop-hint">PNG, JPG, WEBP up to 10MB</span>
        <input #fileInput type="file" accept="image/*" hidden (change)="onFileSelected($event)" />
      </div>

      <!-- Preview -->
      <div class="preview-area" *ngIf="previewUrl">
        <div class="preview-image-wrap">
          <img class="preview-image" [src]="previewUrl" alt="preview" />
          <button class="remove-btn" (click)="removeImage()">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>

      <!-- Caption & Submit -->
      <div class="upload-form" *ngIf="previewUrl">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Write a caption...</mat-label>
          <textarea matInput [(ngModel)]="caption" rows="3" placeholder="Tell your story..."></textarea>
        </mat-form-field>

        <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button
          mat-raised-button color="primary"
          class="full-width share-btn"
          (click)="uploadPost()"
          [disabled]="isUploading"
        >
          <mat-icon>send</mat-icon>
          {{ isUploading ? 'Sharing...' : 'Share Photo' }}
        </button>
      </div>
    </mat-card>

  </div>
</div>
